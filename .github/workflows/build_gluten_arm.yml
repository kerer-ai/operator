name: Build Gluten on ARM

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v3

    - name: Set up QEMU for multi-arch support
      uses: docker/setup-qemu-action@v3

    - name: Build and run ARM container
      run: |
        # 拉取 ARM64 镜像
        docker pull swr.cn-north-4.myhuaweicloud.com/cloud_boostkit/openeuler22.03_lts_sp3:arm64_003

        # 启动容器并执行构建
        docker run --rm --platform linux/arm64 \
          -v "${{ github.workspace }}:/opt/build" \
          --workdir "/opt" \
          swr.cn-north-4.myhuaweicloud.com/cloud_boostkit/openeuler22.03_lts_sp3:arm64_003 \
          bash -c "\
            set -euo pipefail; \
            # 安装必要的构建依赖
            yum install -y git gcc g++ make cmake maven; \

            # 拉取代码到容器内
            echo '拉取代码 https://gitcode.com/kerer-sk/Gluten.git 到容器，分支：master...';
            rm -rf /opt/gluten;
            git clone https://gitcode.com/kerer-sk/Gluten.git /opt/gluten;
            cd /opt/gluten;
            git checkout master;
            echo '代码拉取完成，存放路径：/opt/gluten';

            # 执行构建脚本
            local full_build_script_path='/opt/gluten/.build/scripts/gluten_compile.sh';
            echo '执行构建脚本：$full_build_script_path';
            if [[ ! -f $full_build_script_path ]]; then
                echo '构建脚本不存在！路径：$full_build_script_path';
                exit 1;
            fi;
            chmod +x $full_build_script_path;
            $full_build_script_path package;
            echo '构建脚本执行完成！';

            # 复制构建产物到挂载目录
            cp -r /opt/gluten/build-output/* /opt/build/build-output/;
          "

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gluten-artifacts-arm
        path: build-output/*.zip
